<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <title>PWA</title>
        <meta
            name="viewport"
            content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover, interactive-widget=resizes-content"
        />
        <meta name="apple-mobile-web-app-capable" content="yes" />
        <meta name="mobile-web-app-capable" content="yes" />
        <meta
            name="apple-mobile-web-app-status-bar-style"
            content="black-translucent"
        />
        <meta name="color-scheme" content="light" />
        <meta name="theme-color" content="#ffffff" />
        <link rel="icon" href="/icon.svg" type="image/svg+xml" />
        <link rel="apple-touch-icon" href="/icon-180.png" />
        <style>
            .reload-overlay { position: fixed; inset: 0; z-index: 9999; background: #ffffff; }
            .reload-overlay[hidden] { display: none; }
        </style>
        <script>
            (function () {
                try {
                    var raw = localStorage.getItem('insets-v1')
                    if (!raw) return
                    var cache = JSON.parse(raw)
                    var o = window.matchMedia('(orientation: portrait)').matches ? 'p' : 'l'
                    var v = cache && cache[o]
                    if (!v) return
                    var s = document.documentElement.style
                    if (v.t != null) s.setProperty('--sai-top',    v.t + 'px')
                    if (v.r != null) s.setProperty('--sai-right',  v.r + 'px')
                    if (v.b != null) s.setProperty('--sai-bottom', v.b + 'px')
                    if (v.l != null) s.setProperty('--sai-left',   v.l + 'px')
                    if (v.h != null) s.setProperty('--app-h',      v.h + 'px')
                } catch (e) {}
            })()
        </script>
    </head>
    <body>
        <app-shell>
            <app-top-bar></app-top-bar>
            <app-update-banner hidden></app-update-banner>
            <app-content></app-content>
            <app-bottom-bar></app-bottom-bar>
        </app-shell>
        <div class="reload-overlay"></div>
        <script type="module" src="/src/main.ts"></script>
    </body>
</html>
